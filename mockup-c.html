<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Judge · Mockup C</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FDFAF7;
    --surface: #FFFFFF;
    --border: #EDE8E2;
    --border-2: #D8D0C8;
    --text: #1C1410;
    --text-2: #7A6E64;
    --text-3: #B8ADA4;
    --accent: #D4472A;
    --accent-bg: rgba(212,71,42,0.06);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  /* ── Progress bar ── */
  .progress-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .back {
    position: fixed; top: 24px; left: 28px;
    font-size: 0.75rem; color: var(--text-3);
    text-decoration: none;
    transition: color 0.15s;
  }
  .back:hover { color: var(--text-2); }

  /* ── Shell ── */
  .shell {
    max-width: 680px;
    margin: 0 auto;
    padding: 72px 40px 120px;
    transition: opacity 0.2s;
  }
  .shell.fading { opacity: 0; }

  /* ── Header ── */
  .header {
    margin-bottom: 40px;
  }
  .pair-meta {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 12px;
  }

  .person-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .person-avi {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #F4A57A, #E8472A);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    color: white;
    flex-shrink: 0;
  }
  .person-info {}
  .person-name {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 1px;
  }
  .person-desc {
    font-size: 0.78rem;
    color: var(--text-2);
  }

  /* ── Bio blocks ── */
  .bio-block {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 12px;
    transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
    position: relative;
  }
  .bio-block:last-of-type { margin-bottom: 24px; }

  .bio-block.chosen {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }
  .bio-block.rejected {
    opacity: 0.35;
  }

  .bio-num {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bio-num::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chosen-mark {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--accent);
    margin-left: auto;
    margin-right: 0;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .bio-block.chosen .chosen-mark { opacity: 1; }

  .bio-text {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text);
  }

  /* ── Judge row ── */
  .judge-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .judge-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 11px 20px;
    color: var(--text-2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .judge-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
    transform: translateY(-1px);
  }
  .judge-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .judge-btn.eq-btn { flex: 1; justify-content: center; }
  .judge-btn.eq-btn:hover {
    border-color: var(--border-2);
    color: var(--text);
    background: var(--bg);
  }

  .key-hint {
    display: inline-block;
    padding: 1px 6px;
    background: var(--border);
    border-radius: 4px;
    font-size: 0.62rem;
    color: var(--text-3);
    font-family: 'DM Sans', monospace;
  }

  /* ── Status / Next ── */
  .status-row {
    display: none;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .status-row.visible { display: flex; }

  .status-text {
    font-size: 0.82rem;
    color: var(--text-2);
  }
  .status-text .hi { color: var(--accent); font-weight: 600; }

  .next-btn {
    margin-left: auto;
    background: linear-gradient(135deg, #E8472A, #D64B6A);
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 12px rgba(232,71,42,0.2);
  }
  .next-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(232,71,42,0.3);
  }

  /* ── Counter ── */
  .counter {
    position: fixed;
    bottom: 28px; right: 28px;
    font-size: 0.68rem;
    color: var(--text-3);
    font-weight: 500;
    text-align: right;
  }
  .counter-num {
    font-family: 'Lora', serif;
    font-size: 2rem;
    color: var(--text-2);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<a class="back" href="index.html">← back</a>

<div class="shell" id="shell">
  <div class="header">
    <div class="pair-meta" id="pairMeta">Pair 1 of 5</div>
    <div class="person-card">
      <div class="person-avi" id="personAvi">JM</div>
      <div class="person-info">
        <div class="person-name" id="personName">Jordan M., 26</div>
        <div class="person-desc" id="personDesc"></div>
      </div>
    </div>
  </div>

  <div class="bio-block" id="blockA">
    <div class="bio-num">
      Bio 1
      <span class="chosen-mark">Preferred ✓</span>
    </div>
    <div class="bio-text" id="textA"></div>
  </div>

  <div class="bio-block" id="blockB">
    <div class="bio-num">
      Bio 2
      <span class="chosen-mark">Preferred ✓</span>
    </div>
    <div class="bio-text" id="textB"></div>
  </div>

  <div class="judge-row">
    <button class="judge-btn" id="btnA" onclick="choose('A')">
      ← Bio 1 <span class="key-hint">1</span>
    </button>
    <button class="judge-btn eq-btn" id="btnEq" onclick="choose('EQ')">
      Equal <span class="key-hint">=</span>
    </button>
    <button class="judge-btn" id="btnB" onclick="choose('B')">
      <span class="key-hint">2</span> Bio 2 →
    </button>
  </div>

  <div class="status-row" id="statusRow">
    <span class="status-text" id="statusText"></span>
    <button class="next-btn" onclick="nextPair()">Next → <span class="key-hint">↵</span></button>
  </div>
</div>

<div class="counter">
  <span class="counter-num" id="counterNum">0</span>
  labeled
</div>

<script>
const PAIRS = [
  {
    person: { name: 'Jordan M., 26', desc: 'Software engineer · NYC · hiking, cooking, live music', avi: 'JM' },
    a: 'I love hiking and cooking Italian food. I work in tech and spend my weekends exploring the city. Big music fan always looking for concert buddies. Looking for someone genuine who wants to build something real.',
    b: 'I write code that works on my machine (usually). I make pasta from scratch on Sundays because it\'s the only thing slower than my test suite. If your idea of a perfect night involves arguing whether Die Hard is a Christmas movie — we\'re going to get along great.'
  },
  {
    person: { name: 'Casey L., 24', desc: 'Kindergarten teacher · Brooklyn · books, plants, yoga', avi: 'CL' },
    a: 'I spend my days teaching 5-year-olds that sharing is caring, then immediately fail to share my fries. 47 plants, zero regrets. Currently on a Russian lit kick — which explains the vague existential expression.',
    b: 'Elementary teacher who loves reading and plants. I do yoga on weekends and love exploring coffee shops around Brooklyn. Looking for someone kind and adventurous to spend time with.'
  },
  {
    person: { name: 'Avery K., 28', desc: 'UX designer · Manhattan · travel, climbing, film photography', avi: 'AK' },
    a: 'I collect passport stamps and climbing calluses with equal enthusiasm. Shoot film because I like the commitment — you can\'t swipe left on a photo you\'ve already taken. Currently planning my 4th trip to Japan. Yes, I have a problem.',
    b: 'Love traveling and trying new foods. I design apps for work and enjoy rock climbing on weekends. Film photography is my creative outlet. Looking for someone to explore the city with.'
  },
  {
    person: { name: 'Sam R., 30', desc: 'Chef · Lower East Side · sourdough, natural wine, markets', avi: 'SR' },
    a: 'Professional chef who eats cereal for dinner at home. I spend 60 hours a week making food look beautiful and then can\'t be bothered. If you\'re a natural disaster in the kitchen too, we\'ll get along. My sourdough starter is named Gerald and he\'s doing great.',
    b: 'I\'m a chef who loves trying new restaurants and cuisines. Passionate about food and sustainability. Looking for someone who appreciates good conversation and great meals.'
  },
  {
    person: { name: 'Morgan P., 27', desc: 'Journalist · Midtown · Scrabble, annotated books, arguments', avi: 'MP' },
    a: 'I write about things I barely understand, which is apparently journalism. Amateur competitive Scrabble player (yes, really). My book-to-read pile has achieved structural integrity at this point. Looking for someone who won\'t judge my annotated paperbacks.',
    b: 'Journalist passionate about storytelling. I love reading, board games, and good coffee. Looking for someone curious and kind who enjoys exploring the city and talking about ideas.'
  }
];

let current = 0;
let chosen = null;
let labeled = 0;
let prefs = [];

function loadPair(idx) {
  const pair = PAIRS[idx];
  chosen = null;

  document.getElementById('pairMeta').textContent = `Pair ${idx + 1} of ${PAIRS.length}`;
  document.getElementById('personAvi').textContent = pair.person.avi;
  document.getElementById('personName').textContent = pair.person.name;
  document.getElementById('personDesc').textContent = pair.person.desc;
  document.getElementById('textA').textContent = pair.a;
  document.getElementById('textB').textContent = pair.b;

  ['blockA','blockB'].forEach(id => {
    document.getElementById(id).classList.remove('chosen','rejected');
  });
  ['btnA','btnEq','btnB'].forEach(id => document.getElementById(id).disabled = false);
  document.getElementById('statusRow').classList.remove('visible');
  document.getElementById('progressFill').style.width = (idx / PAIRS.length * 100) + '%';
}

function choose(which) {
  if (chosen !== null) return;
  chosen = which;
  labeled++;
  document.getElementById('counterNum').textContent = labeled;

  const pair = PAIRS[current];
  prefs.push({ person: pair.person.name, chosen: which, a: pair.a, b: pair.b });

  if (which === 'A') {
    document.getElementById('blockA').classList.add('chosen');
    document.getElementById('blockB').classList.add('rejected');
    document.getElementById('statusText').innerHTML = 'You preferred <span class="hi">Bio 1</span>.';
  } else if (which === 'B') {
    document.getElementById('blockB').classList.add('chosen');
    document.getElementById('blockA').classList.add('rejected');
    document.getElementById('statusText').innerHTML = 'You preferred <span class="hi">Bio 2</span>.';
  } else {
    document.getElementById('statusText').innerHTML = 'Marked as <span class="hi">equal</span>.';
  }

  ['btnA','btnEq','btnB'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('statusRow').classList.add('visible');
}

function nextPair() {
  const shell = document.getElementById('shell');
  shell.classList.add('fading');
  setTimeout(() => {
    current = (current + 1) % PAIRS.length;
    loadPair(current);
    shell.classList.remove('fading');
  }, 200);
}

document.addEventListener('keydown', e => {
  if (e.key === '1') choose('A');
  else if (e.key === '2') choose('B');
  else if (e.key === '=') choose('EQ');
  else if (e.key === 'Enter' && chosen !== null) nextPair();
});

loadPair(0);
</script>
</body>
</html>
