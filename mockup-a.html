<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bio Swipe · Mockup A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --hinge: #FF5733;
    --hinge-light: #FF7A5C;
    --hinge-dark: #C0392B;
    --warm-bg: #FFF8F5;
    --card-bg: #FFFFFF;
    --text: #1A0A00;
    --text-2: #7A5C52;
    --text-3: #C4A99E;
    --green: #27AE60;
    --red: #E74C3C;
    --border: #F0E0D8;
  }

  html, body {
    height: 100%;
    background: var(--warm-bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── Back link ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    font-size: 0.78rem; color: var(--text-2); text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    opacity: 0.7; transition: opacity 0.15s;
  }
  .back:hover { opacity: 1; }

  /* ── Layout ── */
  .shell {
    max-width: 390px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    position: relative;
  }

  /* ── Header ── */
  .header {
    padding: 52px 0 16px;
    text-align: center;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--hinge);
    letter-spacing: -0.02em;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--hinge);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .progress-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-3);
    white-space: nowrap;
  }

  /* ── Person chip ── */
  .person-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px 8px 8px;
    margin: 0 auto 20px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(255,87,51,0.08);
  }
  .person-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--hinge-light), var(--hinge-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; color: white; font-weight: 600;
    flex-shrink: 0;
  }
  .person-info { font-size: 0.82rem; }
  .person-name { font-weight: 600; color: var(--text); }
  .person-sub { color: var(--text-2); font-size: 0.75rem; }

  /* ── Card stack ── */
  .card-area {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .bio-card {
    position: absolute;
    width: 100%;
    background: var(--card-bg);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 0 8px 32px rgba(26,10,0,0.10), 0 2px 8px rgba(26,10,0,0.06);
    border: 1px solid var(--border);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
    will-change: transform;
    user-select: none;
    touch-action: none;
  }
  .bio-card.back-card {
    transform: scale(0.94) translateY(12px);
    z-index: 1;
  }
  .bio-card.front-card {
    z-index: 2;
    cursor: grab;
  }
  .bio-card.front-card:active { cursor: grabbing; }
  .bio-card.swiping { transition: none; }
  .bio-card.swipe-right {
    transform: translateX(120%) rotate(15deg) !important;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.45s ease;
  }
  .bio-card.swipe-left {
    transform: translateX(-120%) rotate(-15deg) !important;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.45s ease;
  }

  .card-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 14px;
  }
  .bio-text {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    line-height: 1.65;
    color: var(--text);
    font-weight: 300;
  }
  .bio-text em {
    font-style: italic;
    color: var(--hinge);
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 18px;
  }
  .tag {
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--warm-bg);
    border: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--text-2);
    font-weight: 500;
  }

  /* ── Swipe hints ── */
  .hint-left, .hint-right {
    position: absolute;
    top: 24px;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
    border-width: 2px;
    border-style: solid;
    z-index: 3;
  }
  .hint-left {
    left: 20px;
    color: var(--red);
    border-color: var(--red);
    background: rgba(231,76,60,0.08);
  }
  .hint-right {
    right: 20px;
    color: var(--green);
    border-color: var(--green);
    background: rgba(39,174,96,0.08);
  }

  /* ── Compare reveal ── */
  .compare-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-radius: 20px 20px 24px 24px;
    padding: 16px 20px 20px;
    border: 1px solid var(--border);
    border-top: none;
    z-index: 3;
    transform: translateY(calc(100% - 44px));
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    max-height: 60%;
    overflow-y: auto;
  }
  .compare-panel.open { transform: translateY(0); }
  .compare-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 12px;
    cursor: pointer;
  }
  .compare-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--hinge);
    margin-bottom: 8px;
  }
  .compare-text {
    font-family: 'Fraunces', serif;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text-2);
  }

  /* ── Action buttons ── */
  .actions {
    padding: 20px 0 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .action-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.9); }
  .action-skip {
    background: white;
    box-shadow: 0 4px 16px rgba(231,76,60,0.2);
    border: 2px solid #FDDCDA;
  }
  .action-prefer {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--hinge-light), var(--hinge-dark));
    box-shadow: 0 8px 24px rgba(255,87,51,0.35);
    font-size: 1.8rem;
  }
  .action-compare {
    background: white;
    box-shadow: 0 4px 16px rgba(26,10,0,0.08);
    border: 2px solid var(--border);
    font-size: 1.1rem;
  }

  /* ── Done state ── */
  .done-state {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding-bottom: 60px;
  }
  .done-emoji { font-size: 3rem; }
  .done-title {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }
  .done-sub { font-size: 0.9rem; color: var(--text-2); line-height: 1.5; }
  .done-type {
    background: linear-gradient(135deg, var(--hinge-light), var(--hinge-dark));
    color: white;
    padding: 10px 24px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .reset-btn {
    background: none; border: 1px solid var(--border);
    padding: 10px 24px; border-radius: 999px;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
    color: var(--text-2); transition: background 0.15s;
  }
  .reset-btn:hover { background: var(--border); }
</style>
</head>
<body>

<a class="back" href="index.html">← back</a>

<div class="shell">
  <div class="header">
    <div class="logo">bio.judge</div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
      <div class="progress-label" id="progressLabel">2 of 20</div>
    </div>
  </div>

  <div class="person-chip">
    <div class="person-avatar">JM</div>
    <div class="person-info">
      <div class="person-name">Jordan M., 26</div>
      <div class="person-sub">Software engineer · NYC</div>
    </div>
  </div>

  <!-- Card area -->
  <div class="card-area" id="cardArea">
    <!-- Back card (next pair) -->
    <div class="bio-card back-card" id="backCard">
      <div class="card-label">Bio A</div>
      <div class="bio-text">Loading next pair…</div>
    </div>

    <!-- Front card -->
    <div class="bio-card front-card" id="frontCard">
      <div class="card-label" id="cardLabel">Bio A</div>
      <div class="bio-text" id="cardText"></div>
      <div class="card-tags" id="cardTags"></div>

      <div class="hint-left" id="hintLeft">SKIP ✕</div>
      <div class="hint-right" id="hintRight">PREFER ✓</div>
    </div>

    <!-- Compare panel (slides up from bottom) -->
    <div class="compare-panel" id="comparePanel">
      <div class="compare-handle" onclick="toggleCompare()"></div>
      <div class="compare-label">Other bio</div>
      <div class="compare-text" id="compareText"></div>
    </div>
  </div>

  <!-- Done state -->
  <div class="done-state" id="doneState">
    <div class="done-emoji">✨</div>
    <div class="done-title">Your type is revealed</div>
    <div class="done-sub">Based on your preferences, you value authenticity and wit over generic introductions.</div>
    <div class="done-type">🌟 Your dating type: Taylor Swift energy</div>
    <div class="reset-btn" onclick="reset()">Label more bios</div>
  </div>

  <div class="actions" id="actions">
    <button class="action-btn action-skip" onclick="swipe('left')" title="Skip">✕</button>
    <button class="action-btn action-prefer" onclick="swipe('right')" title="Prefer this bio">♥</button>
    <button class="action-btn action-compare" onclick="toggleCompare()" title="Compare">⇅</button>
  </div>
</div>

<script>
const PAIRS = [
  {
    person: { name: 'Jordan M., 26', sub: 'Software engineer · NYC' },
    a: {
      text: 'I love hiking and cooking Italian food. I work in tech and spend my weekends exploring the city. Big music fan always looking for concert buddies. Looking for someone genuine who wants to build something real.',
      tags: ['hiking', 'cooking', 'live music']
    },
    b: {
      text: 'I write code that works on my machine (usually). I make pasta from scratch on Sundays because it\'s the only thing slower than my test suite. If your idea of a perfect night involves arguing whether Die Hard is a Christmas movie — we\'re going to get along great.',
      tags: ['pasta nerd', 'film takes', 'bad debugger']
    }
  },
  {
    person: { name: 'Casey L., 24', sub: 'Kindergarten teacher · Brooklyn' },
    a: {
      text: 'I spend my days teaching 5-year-olds that sharing is caring, then immediately fail to share my fries. 47 plants, zero regrets. Currently on a Russian lit kick — which explains the vague existential expression.',
      tags: ['plant mom', 'reader', 'yoga']
    },
    b: {
      text: 'Elementary teacher who loves reading and plants. I do yoga on weekends and love exploring coffee shops around Brooklyn. Looking for someone kind and adventurous to spend time with.',
      tags: ['books', 'plants', 'coffee']
    }
  },
  {
    person: { name: 'Avery K., 28', sub: 'UX designer · Manhattan' },
    a: {
      text: 'I collect passport stamps and climbing calluses with equal enthusiasm. Shoot film because I like the commitment — you can\'t swipe left on a photo you\'ve already taken. Currently planning my 4th trip to Japan. Yes, I have a problem.',
      tags: ['film photography', 'climbing', 'japan obsessed']
    },
    b: {
      text: 'Love traveling and trying new foods. I design apps for work and enjoy rock climbing on weekends. Film photography is my creative outlet. Looking for someone to explore the city with.',
      tags: ['travel', 'climbing', 'design']
    }
  },
  {
    person: { name: 'Sam R., 30', sub: 'Chef · Lower East Side' },
    a: {
      text: 'Professional chef who eats cereal for dinner at home. I spend 60 hours a week making food look beautiful and then can\'t be bothered. If you\'re a natural disaster in the kitchen too, we\'ll get along. My sourdough starter is named Gerald and he\'s doing great.',
      tags: ['sourdough dad', 'cereal defender', 'Gerald']
    },
    b: {
      text: 'I\'m a chef who loves trying new restaurants and cuisines. Passionate about food and sustainability. Looking for someone who appreciates good conversation and great meals.',
      tags: ['food', 'sustainability', 'restaurants']
    }
  },
  {
    person: { name: 'Morgan P., 27', sub: 'Journalist · Midtown' },
    a: {
      text: 'I write about things I barely understand, which is apparently journalism. Amateur competitive Scrabble player (yes, really). My book-to-read pile has achieved structural integrity at this point. Looking for someone who won\'t judge my annotated paperbacks.',
      tags: ['Scrabble nerd', 'book hoarder', 'curious']
    },
    b: {
      text: 'Journalist passionate about storytelling. I love reading, board games, and good coffee. Looking for someone curious and kind who enjoys exploring the city and talking about ideas.',
      tags: ['reading', 'coffee', 'board games']
    }
  }
];

let current = 0;
let showingA = true;
let compareOpen = false;
let isDragging = false;
let startX = 0, startY = 0, currentX = 0;
let prefs = [];

const frontCard = document.getElementById('frontCard');
const backCard = document.getElementById('backCard');
const cardLabel = document.getElementById('cardLabel');
const cardText = document.getElementById('cardText');
const cardTags = document.getElementById('cardTags');
const compareText = document.getElementById('compareText');
const hintLeft = document.getElementById('hintLeft');
const hintRight = document.getElementById('hintRight');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const comparePanel = document.getElementById('comparePanel');
const doneState = document.getElementById('doneState');
const actions = document.getElementById('actions');
const cardArea = document.getElementById('cardArea');

function loadPair(idx) {
  if (idx >= PAIRS.length) { showDone(); return; }
  const pair = PAIRS[idx];
  showingA = true;
  compareOpen = false;
  comparePanel.classList.remove('open');

  const bio = pair.a;
  cardLabel.textContent = 'Bio A';
  cardText.textContent = bio.text;
  cardTags.innerHTML = bio.tags.map(t => `<span class="tag">${t}</span>`).join('');
  compareText.textContent = pair.b.text;

  // Update person chip
  document.querySelector('.person-name').textContent = pair.person.name;
  document.querySelector('.person-sub').textContent = pair.person.sub;
  const initials = pair.person.name.split(' ').map(p=>p[0]).join('').slice(0,2);
  document.querySelector('.person-avatar').textContent = initials;

  // Progress
  const pct = (idx / PAIRS.length) * 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${idx + 1} of ${PAIRS.length}`;

  // Reset card
  frontCard.classList.remove('swipe-left', 'swipe-right', 'swiping');
  frontCard.style.transform = '';
  hintLeft.style.opacity = '0';
  hintRight.style.opacity = '0';
}

function toggleCompare() {
  compareOpen = !compareOpen;
  comparePanel.classList.toggle('open', compareOpen);
}

function swipe(dir) {
  if (current >= PAIRS.length) return;
  const pair = PAIRS[current];

  // Record preference
  prefs.push({
    prompt: pair.person.sub,
    showing: showingA ? 'A' : 'B',
    direction: dir,
    chosen: dir === 'right' ? (showingA ? 'A' : 'B') : (showingA ? 'B' : 'A')
  });

  frontCard.classList.add(dir === 'right' ? 'swipe-right' : 'swipe-left');

  setTimeout(() => {
    current++;
    loadPair(current);
  }, 450);
}

function showDone() {
  cardArea.style.display = 'none';
  actions.style.display = 'none';
  doneState.style.display = 'flex';
  progressFill.style.width = '100%';
  progressLabel.textContent = `${PAIRS.length} of ${PAIRS.length}`;
}

function reset() {
  current = 0; prefs = [];
  cardArea.style.display = '';
  actions.style.display = '';
  doneState.style.display = 'none';
  loadPair(0);
}

// Touch/mouse drag
frontCard.addEventListener('mousedown', dragStart);
frontCard.addEventListener('touchstart', dragStart, {passive: true});
document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, {passive: false});
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
  if (current >= PAIRS.length) return;
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX;
  startY = pt.clientY;
  currentX = 0;
  frontCard.classList.add('swiping');
}

function dragMove(e) {
  if (!isDragging) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  const rotate = currentX * 0.08;
  frontCard.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

  const ratio = Math.abs(currentX) / 100;
  if (currentX > 20) {
    hintRight.style.opacity = Math.min(ratio, 1);
    hintLeft.style.opacity = '0';
  } else if (currentX < -20) {
    hintLeft.style.opacity = Math.min(ratio, 1);
    hintRight.style.opacity = '0';
  } else {
    hintLeft.style.opacity = '0';
    hintRight.style.opacity = '0';
  }
}

function dragEnd() {
  if (!isDragging) return;
  isDragging = false;
  frontCard.classList.remove('swiping');

  if (currentX > 80) {
    swipe('right');
  } else if (currentX < -80) {
    swipe('left');
  } else {
    frontCard.style.transform = '';
    hintLeft.style.opacity = '0';
    hintRight.style.opacity = '0';
  }
}

loadPair(0);
</script>
</body>
</html>
